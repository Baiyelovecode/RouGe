  .enemy-unit{right:5%;top:22%;width:min(560px,54%);height:214px;display:flex;align-items:flex-end;justify-content:flex-end;gap:10px;color:#ffd0d0;background:none;border:0;pointer-events:auto}.enemy-unit .enemy-party-card{width:142px;height:190px;border:0;background:none;color:inherit;padding:0;text-align:left;position:relative;transition:transform .14s,filter .14s,opacity .14s}.enemy-unit .enemy-party-card:hover{transform:translateY(-6px);filter:brightness(1.08)}.enemy-unit .enemy-party-card.active{transform:translateY(-10px)}.enemy-unit .enemy-party-card.active .avatar-shell{border-color:rgba(229,190,99,.92);box-shadow:0 0 0 2px rgba(229,190,99,.18),0 20px 38px rgba(0,0,0,.34)}.enemy-unit .enemy-party-card.dead{opacity:.42;filter:grayscale(.55)}.enemy-unit .avatar-shell{height:174px}.enemy-hud{position:absolute;left:7px;right:7px;bottom:0;border:1px solid rgba(60,90,125,.78);border-radius:8px;background:rgba(8,14,24,.86);padding:5px 7px;z-index:2}.enemy-hud-top{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:11px;font-weight:900}.enemy-hpbar{height:5px;margin-top:4px;border-radius:999px;background:rgba(240,106,106,.16);overflow:hidden}.enemy-hpbar span{display:block;height:100%;background:linear-gradient(90deg,#f06a6a,#f0a23a)}.enemy-hud-meta{margin-top:4px;color:#aebed2;font-size:10px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.enemy-roster{display:none}.intent-card{right:auto;left:50%;top:20px;transform:translateX(-10%);width:min(320px,34%)}
  @keyframes handCast{0%{transform:translateY(-5px) scale(1)}70%{transform:translateY(-24px) scale(1.04);opacity:.92}100%{transform:translateY(-34px) scale(.96);opacity:.55}}
  @keyframes castCard{0%{opacity:0;transform:translate(-40px,46px) scale(.78) rotate(-4deg)}24%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(92px,-26px) scale(.86) rotate(4deg)}}
  @keyframes orbFly{0%{left:36%;top:51%;opacity:0;transform:scale(.4)}20%{opacity:1}100%{left:73%;top:48%;opacity:0;transform:scale(1.25)}}
  @keyframes floatUp{0%{opacity:0;transform:translateY(12px) scale(.9)}18%{opacity:1}100%{opacity:0;transform:translateY(-34px) scale(1.06)}}
  @keyframes unitHit{0%,100%{transform:translateX(0);filter:none}24%{transform:translateX(8px);filter:brightness(1.45)}48%{transform:translateX(-6px);filter:brightness(1.25)}}
  @keyframes unitGuard{0%{transform:scale(1);filter:none}45%{transform:scale(1.07);filter:drop-shadow(0 0 18px rgba(32,198,215,.58))}100%{transform:scale(1);filter:none}}
  @keyframes fieldShake{0%,100%{transform:translateX(0)}25%{transform:translateX(3px)}50%{transform:translateX(-3px)}75%{transform:translateX(2px)}}
  @media(max-width:1180px){body{overflow:auto}.app{min-width:0;height:auto;min-height:100vh;display:block}.topbar,.toolbar{flex-wrap:wrap;height:auto;padding:10px}.main,.bottom{grid-template-columns:1fr}.center{grid-template-rows:auto auto}.battlefield{min-height:420px}.enemy-unit{right:4%;top:26%;width:62%;height:220px;gap:8px}.enemy-unit .enemy-party-card{width:128px}.intent-card{left:22px;right:22px;top:18px;transform:none;width:auto}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="mark"></div><div><div class="brand-title">数值之塔</div><div class="brand-sub">手动卡牌战斗 · 肉鸽爬塔 UI 原型</div></div></div>
    <div class="toolbar">
      <select class="control" id="role"><option value="exile">流亡者</option><option value="toxicist">诡毒师</option><option value="burner">燃尽者</option></select>
      <input class="control seed" id="seed" placeholder="seed">
      <select class="control" id="enemyType"><option value="normal">普通战斗</option><option value="elite">精英战斗</option><option value="boss">Boss 战</option></select>
      <button class="btn primary" id="newBtn">新局</button>
      <button class="btn good" id="startBtn">测试开战</button>
      <button class="btn warn" id="endBtn">结束回合</button>
      <button class="btn ghost" id="autoBtn">自动一步</button>
    </div>
  </header>
  <main class="main">
    <section class="col left">
      <div class="panel"><div class="panel-head">玩家 <small id="phaseText">map</small></div><div class="panel-body"><div id="playerCard" class="fighter-card"></div></div></div>
      <div class="panel"><div class="panel-head">敌人意图 <small id="turnText">Act 1</small></div><div class="panel-body"><div id="enemyCard" class="fighter-card"></div></div></div>
      <div class="panel"><div class="panel-head">战斗记录 <small>当前战斗</small></div><div class="panel-body"><div id="gameLog" class="log-list"></div></div></div>
    </section>
    <section class="col center">
      <div class="panel battlefield">
        <div class="lane"></div><div class="tower-line"></div><div class="unit player-unit" id="playerUnit">玩家</div><div class="unit enemy-unit" id="enemyUnit">敌人</div><div id="battleFx" class="battle-fx"></div><div id="enemyRoster" class="enemy-roster"></div>
        <div class="intent-card"><div class="label">ENEMY INTENT</div><div class="text" id="intentText">选择路线开始</div></div>
        <div class="flow-strip"><div class="flow-step active">路线</div><div class="flow-step">战斗</div><div class="flow-step">奖励</div><div class="flow-step">商店/事件</div><div class="flow-step">Boss</div></div>
      </div>
      <div class="panel collapsible hand-panel" id="handPanel"><div class="panel-head" onclick="togglePanel('handPanel',event)"><div class="panel-title">当前手牌 <small>点击卡牌使用</small></div><button class="panel-toggle" type="button">收起</button></div><div class="panel-body"><div id="hand" class="hand-grid"></div></div></div>
    </section>
    <section class="col right">
      <div class="panel collapsible" id="actionPanel"><div class="panel-head" onclick="togglePanel('actionPanel',event)"><div class="panel-title">行动面板 <small>地图 / 奖励 / 商店</small></div><button class="panel-toggle" type="button">收起</button></div><div class="panel-body"><div id="actions" class="action-grid"></div></div></div>
      <div class="panel collapsible" id="deckPanel"><div class="panel-head" onclick="togglePanel('deckPanel',event)"><div class="panel-title">牌组 <small id="deckCount">0 cards</small></div><button class="panel-toggle" type="button">收起</button></div><div class="panel-body"><div id="deck" class="deck-list"></div></div></div>
      <div class="panel collapsible collapsed" id="historyPanel"><div class="panel-head" onclick="togglePanel('historyPanel',event)"><div class="panel-title">最近操作 <small>History</small></div><button class="panel-toggle" type="button">展开</button></div><div class="panel-body"><div id="history" class="history-list"></div></div></div>
    </section>
  </main>
  <footer class="bottom">
    <div class="panel collapsible" id="relicPanel"><div class="panel-head" onclick="togglePanel('relicPanel',event)"><div class="panel-title">遗物 <small>Relics</small></div><button class="panel-toggle" type="button">收起</button></div><div class="panel-body"><div id="relics" class="compact-list"></div></div></div>
    <div class="panel collapsible collapsed" id="rolePanel"><div class="panel-head" onclick="togglePanel('rolePanel',event)"><div class="panel-title">角色机制 <small>Role Passive</small></div><button class="panel-toggle" type="button">展开</button></div><div class="panel-body" id="roleHint"></div></div>
    <div class="panel collapsible collapsed" id="tipPanel"><div class="panel-head" onclick="togglePanel('tipPanel',event)"><div class="panel-title">提示 <small>UI Prototype</small></div><button class="panel-toggle" type="button">展开</button></div><div class="panel-body"><div class="log-row">当前版本已经接入爬塔主循环：路线节点、战斗、奖励、宝箱、休息、训练、商店和事件都可以在网页中操作。</div></div></div>
  </footer>
</div>
<div id="detailPop" class="detail-pop" aria-live="polite">
  <div class="detail-head">
    <div class="detail-title" id="detailTitle">详情</div>
    <button class="detail-close" onclick="hideDetail()">×</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>
<script>
const roleNames={exile:'流亡者',toxicist:'诡毒师',burner:'燃尽者'};
const statusNames={poison:'中毒',burn:'灼烧',bleed:'流血',weak:'虚弱',vulnerable:'易伤',fragile:'脆弱',regeneration:'再生',energy_debt:'能量透支',next_energy:'下回合能量',next_draw:'下回合抽牌',retain_block:'保留护甲',burn_tick_strength:'灼烧成长',end_burn_from_strength:'续火',next_burn_multiplier:'闪燃',burn_rekindle:'复燃',burn_on_card:'点火'};
let latestState=null;
const panelTouched=new Set();
async function api(path,options={}){const res=await fetch(path,options);if(!res.ok)throw new Error(await res.text());return res.json()}
async function postJson(path,body){return api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}
async function newGame(){const seed=document.getElementById('seed').value.trim();render(await postJson('/api/new',{role_id:document.getElementById('role').value,seed:seed?Number(seed):null}))}
async function action(actionName,params={}){render(await postJson('/api/action',{action:actionName,params}))}
async function startCombat(){await action('start_combat',{enemy_type:document.getElementById('enemyType').value})}
async function playCard(index){
  const card=(latestState?.combat?.hand||[]).find(c=>c.hand_index===index);
  const targetIndex=latestState?.combat?.enemy?.index??0;
  const el=document.querySelector(`[data-card-index="${index}"]`);
  if(el)el.classList.add('playing');
  showCardCast(card);
  const data=await postJson('/api/action',{action:'play_card',params:{hand_index:index,target_index:targetIndex}});
  render(data);
  showActionFeedback(data.last_action,card,targetIndex);
}
async function endTurn(){await action('end_turn',{})}
async function autoStep(){render(await postJson('/api/step',{agent:'heuristic'}))}
function render(data){
  const state=data.state||{}, player=state.player||{}, combat=state.combat||null, enemy=combat?.enemy||{};
  const enemies=combat?.enemies||[];
  latestState=state;
  document.getElementById('phaseText').textContent=state.phase||'map';
  document.getElementById('turnText').textContent=combat?`Turn ${combat.turn}`:`第 ${state.act||1} 章 / ${state.floor_in_act||1} 层`;
  document.getElementById('playerUnit').innerHTML=playerAvatar(player);
  document.getElementById('enemyUnit').innerHTML=enemyParty(enemies,enemy);
  document.getElementById('intentText').textContent=enemy.intent||(state.phase==='combat'?'未知意图':'选择路线继续爬塔');
  renderFighter('playerCard',player,{role:roleNames[player.role_id]||player.role_id,isPlayer:true});
  renderFighter('enemyCard',enemy,{role:enemy.intent||'尚未出现',isEnemy:true});
  renderHand(combat?.hand||[],data.legal_actions||[],player.energy||0);
  renderActions(state,data.legal_actions||[]);
  renderProcess(state, combat);
  renderDeck(player.skills||[]);
  renderRelics(player.relics||[]);
  renderHistory(data.history||[]);
  renderRoleHint(player);
  syncPanelDefaults(state);
  const inCombat=state.phase==='combat';
  document.getElementById('startBtn').disabled=state.phase!=='map';
  document.getElementById('endBtn').disabled=!inCombat;
}
function renderFighter(id,f,options={}){
  const alive=f?.alive!==false,hp=Number(f?.hp||0),maxHp=Number(f?.max_hp||0),hpPct=maxHp?clamp(hp/maxHp*100,0,100):0,energy=Number(f?.energy||0),energyMax=Number(f?.energy_max||0),energyPct=energyMax?clamp(energy/energyMax*100,0,100):0;
  document.getElementById(id).innerHTML=`<div class="name-row"><div class="fighter-name">${esc(f?.name||'-')}</div><span class="badge ${options.isEnemy?'red':'blue'}">${esc(options.role||'-')}</span></div>
  <div><div class="name-row"><span class="badge ${alive?'green':'red'}">${alive?'存活':'倒下'}</span><span class="mono">${hp}/${maxHp}</span></div><div class="bar"><div class="fill ${options.isEnemy?'enemy-fill':''}" style="width:${hpPct}%"></div></div></div>
  ${options.isPlayer?`<div><div class="name-row"><span class="badge blue">能量</span><span class="mono">${energy}/${energyMax}</span></div><div class="bar"><div class="fill energy-fill" style="width:${energyPct}%"></div></div></div>`:''}
  <div class="stat-grid"><div class="stat"><span>护甲</span><strong>${f?.block??'-'}</strong></div><div class="stat"><span>力量</span><strong>${f?.strength??'-'}</strong></div><div class="stat"><span>敏捷</span><strong>${f?.dexterity??'-'}</strong></div><div class="stat"><span>金币</span><strong>${options.isPlayer?(f?.gold??0):'-'}</strong></div></div>
  <div class="statuses">${renderStatusBadges(f?.statuses||{})||'<span class="empty">无状态</span>'}</div>`;
}
function renderHand(hand,actions,energy){
  const legalMap=new Map();actions.filter(a=>a.action==='play_card').forEach(a=>legalMap.set(a.params.hand_index,a));
  document.getElementById('hand').innerHTML=hand.map(card=>{
    const a=legalMap.get(card.hand_index),legal=a?a.legal:false,cls=card.category==='attack'||card.category==='weapon'?'red':card.category==='defense'?'green':'blue';
    return `<button class="skill-card ${legal?'playable':''}" data-card-index="${card.hand_index}" ${legal?'':'disabled'} onclick="playCard(${card.hand_index})">
      ${cardVisual(card)}
      <div class="skill-top"><div><div class="skill-name">${esc(card.name)}${card.upgrade_level?` +${card.upgrade_level}`:''}</div><span class="badge ${cls}">${categoryName(card.category)} · ${rarityName(card.rarity)}</span></div><div class="cost">${card.cost}</div></div>
      <div class="skill-desc">${esc(card.description)}${card.preview?`<div class="skill-preview">当前：${esc(card.preview)}</div>`:''}</div>
      <div class="skill-meta"><span>#${card.hand_index+1}</span><span>${legal?'可使用':energy<card.cost?'能量不足':'不可用'}</span></div>
    </button>`
  }).join('')||'<div class="empty">非战斗阶段。选择路线或开战后会显示手牌。</div>';
}
function renderActions(state,actions){
  const target=document.getElementById('actions'),phase=state.phase,player=state.player||{};
  if(phase==='map'){target.innerHTML=`<div class="phase-summary"><b>路线选择</b><br>第 ${state.act} 章 / 第 ${state.floor_in_act} 层。选择一个节点推进爬塔。</div><div class="action-section">${(state.node_choices||[]).map(n=>`<button class="action-card" onclick="action('choose_node',{index:${n.index}})"><div class="action-title"><span>${nodeIcon(n.id)} ${esc(n.name)}</span><span class="badge blue">${esc(n.id)}</span></div><div class="action-desc">${nodeHint(n.id)}</div></button>`).join('')}</div>`;return}
  if(phase==='reward'){target.innerHTML=`<div class="phase-summary"><b>战斗胜利</b><br>金币 +${state.last_result?.gold||0}${state.pending_relic?`<br>待领取遗物：${esc(state.pending_relic.name)}`:''}</div><div class="section-label">选择一张卡牌</div><div class="action-section">${(state.pending_reward||[]).map(card=>cardButton(card,`action('pick_reward',{index:${card.hand_index}})`)).join('')}<button class="action-card compact" onclick="action('skip_reward',{})"><div class="action-title"><span>跳过奖励</span><span class="badge">skip</span></div><div class="action-desc">不拿牌，直接进入下一层。</div></button></div>`;return}
  if(phase==='shop'){const shop=state.shop||{};target.innerHTML=`<div class="phase-summary"><b>商店</b><br>金币 ${player.gold??0}。点击遗物可查看详情，购买后商品会从货架移除。</div><div class="section-label">卡牌货架</div><div class="shop-shelf">${(shop.skills||[]).map((c,i)=>c?shopCard(c,c.upgrade_level>0?70:45,'skills',i,player.gold):'').join('')||'<div class="empty">已售罄</div>'}</div><div class="section-label">遗物货架</div><div class="shop-shelf">${(shop.relics||[]).map((r,i)=>r?relicShopCard(r,i,player.gold):'').join('')||'<div class="empty">已售罄</div>'}</div><div class="section-label">强化服务</div><div class="shop-shelf">${(shop.upgrades||[]).map((c,i)=>c?upgradeShopCard(c,i,player.gold):'').join('')||'<div class="empty">没有可升级卡牌</div>'}<button class="action-card compact" ${player.gold>=35?'':'disabled'} onclick="action('shop_buy',{section:'heal'})"><div class="action-title"><span>恢复 20 生命</span><span class="badge gold">35</span></div><div class="action-desc">立即回复生命值。</div></button></div><div class="section-label">移除卡牌 | ${shop.remove_price||60} 金币</div><div class="action-section">${(player.skills||[]).map((c,i)=>`<button class="action-card compact danger" ${(player.gold>=(shop.remove_price||60)&&player.skills.length>5)?'':'disabled'} onclick="action('shop_buy',{section:'remove',index:${i}})"><div class="action-title"><span>${esc(c.name)}</span><span class="badge red">${shop.remove_price||60}</span></div></button>`).join('')}</div><button class="action-card" onclick="action('shop_leave',{})"><div class="action-title"><span>离开商店</span><span class="badge blue">next</span></div><div class="action-desc">结束本层，前往下一层。</div></button>`;return}
  if(phase==='choice'){const choice=state.choice||{};target.innerHTML=`<div class="phase-summary"><b>${esc(choice.title||'选择')}</b><br>${choice.title==='训练场'?'训练升级会把展示的 3 张候选牌全部升级。':'选择一个结果推进本层。'}</div><div class="action-section">${(choice.options||[]).map(o=>`<button class="action-card" onclick="action('choice_select',{index:${o.index}})"><div class="action-title"><span>${esc(o.label)}</span><span class="badge blue">选项 ${o.index+1}</span></div><div class="action-desc">${choiceDesc(o)}</div></button>`).join('')}</div>`;return}
  if(phase==='victory'||phase==='game_over'){target.innerHTML=`<div class="log-row">${phase==='victory'?'通关成功。':'游戏结束。'}点击“新局”重新开始。</div>`;return}
  const playable=actions.filter(a=>a.action==='play_card'&&a.legal).length,all=actions.filter(a=>a.action==='play_card').length,hasEnd=actions.some(a=>a.action==='end_turn');
  target.innerHTML=`<span class="badge blue">手牌 ${all}</span><span class="badge green">可用 ${playable}</span><span class="badge ${hasEnd?'gold':''}">${hasEnd?'可结束回合':'等待开战'}</span>`;
}
function cardButton(card,onClick){return `<button class="action-card" onclick="${onClick}">${cardVisual(card)}<div class="action-title"><span>${esc(card.name)}${card.upgrade_level?` +${card.upgrade_level}`:''}</span><span class="badge blue">${card.cost}</span></div><div class="action-desc">${esc(card.description)}</div></button>`}
function shopCard(card,price,section,index,gold){return `<button class="action-card shop-item" ${gold>=price?'':'disabled'} onclick="action('shop_buy',{section:'${section}',index:${index}})"><span class="badge gold price-ribbon">${price}</span>${cardVisual(card)}<div class="action-title"><span>${esc(card.name)}${card.upgrade_level?` +${card.upgrade_level}`:''}</span><span class="badge blue">${card.cost}</span></div><div class="action-desc">${esc(card.description)}</div></button>`}
function relicShopCard(relic,index,gold){
  return `<div class="shop-item">
    <span class="badge gold price-ribbon">90</span>
    ${relicCard(relic, `showRelicDetail(${jsStr(relic.name)},${jsStr(relic.description)},${jsStr(relic.hook||'')})`)}
    <button class="action-card compact" ${gold>=90?'':'disabled'} onclick="action('shop_buy',{section:'relics',index:${index}})">
      <div class="action-title"><span>购买 ${esc(relic.name)}</span><span class="badge gold">90</span></div>
    </button>
  </div>`;
}
function upgradeShopCard(card,index,gold){return `<button class="action-card" ${gold>=60?'':'disabled'} onclick="action('shop_buy',{section:'upgrades',index:${index}})"><div class="action-title"><span>升级：${esc(card.name)}</span><span class="badge gold">60</span></div><div class="action-desc">Lv.${card.upgrade_level} -> Lv.${card.upgrade_level+1}</div></button>`}
function relicCard(relic,onClick){
  return `<button class="relic-card" title="${esc(relic.description)}" onclick="${onClick}">
    <div class="relic-icon">${relicIcon(relic)}</div>
    <div><div class="relic-name">${esc(relic.name)}</div><div class="relic-desc">${esc(relic.description)}</div></div>
  </button>`;
}
function relicIcon(relic){
  const text=`${relic.name} ${relic.description} ${relic.hook||''}`;
  if(text.includes('毒'))return '毒';
  if(text.includes('燃')||text.includes('灼')||text.includes('烬'))return '火';
  if(text.includes('金币')||text.includes('钱'))return '金';
  if(text.includes('武器')||text.includes('兵'))return '武';
  if(text.includes('护甲')||text.includes('盾'))return '盾';
  if(text.includes('流亡')||text.includes('适应'))return '适';
  if(text.includes('抽牌')||text.includes('手牌'))return '牌';
  return '遗';
}
function showRelicDetail(name,desc,hook){
  document.getElementById('detailTitle').textContent=name;
  const explain=relicHookExplain(hook);
  document.getElementById('detailBody').innerHTML=`<div>${esc(desc)}</div>${explain?`<div class="reason" style="margin-top:8px">机制：${esc(explain)}</div>`:''}`;
  document.getElementById('detailPop').classList.add('show');
}
function hideDetail(){document.getElementById('detailPop').classList.remove('show')}
function cardVisual(card){
  const sigil=cardSigil(card), cls=visualClass(card.category);
  return `<div class="card-visual ${cls}"><span class="card-sigil">${sigil}</span><span class="card-type">${categoryName(card.category)} / ${rarityName(card.rarity)}</span></div>`;
}
function cardSigil(card){
  const text=`${card.name} ${card.description}`;
  if(text.includes('中毒')||text.includes('毒'))return '毒';
  if(text.includes('灼烧')||text.includes('燃')||text.includes('火'))return '火';
  if(text.includes('吸血')||text.includes('回复'))return '血';
  if(card.category==='weapon')return '武';
  if(card.category==='defense')return '盾';
  if(card.category==='power')return '能';
  if(card.category==='skill')return '术';
  return '斩';
}
function visualClass(category){return category==='weapon'?'visual-weapon':category==='defense'?'visual-defense':category==='power'?'visual-power':'visual-attack'}
function categoryName(category){return {attack:'攻击',defense:'防御',skill:'技能',power:'能力',weapon:'武器'}[category]||category}
function rarityName(rarity){return {basic:'基础',common:'普通',uncommon:'罕见',rare:'稀有'}[rarity]||rarity}
function playerAvatar(player){
  const role=player?.role_id||'exile';
  const mark={exile:'刃',toxicist:'毒',burner:'火'}[role]||'人';
  return `<div class="avatar-shell avatar-player avatar-${role}">
    <div class="avatar-art"><div class="avatar-head"></div><div class="avatar-body"></div><div class="avatar-weapon"></div></div>
    <div class="avatar-mark">${mark}</div><div class="avatar-base"></div>
    <div class="avatar-name">${esc(player?.name||'玩家')}</div><div class="avatar-tag">${esc(roleNames[role]||'冒险者')}</div>
  </div>`;
}
function enemyAvatar(enemy){
  if(!enemy||!enemy.name)return `<div class="avatar-shell avatar-enemy"><div class="avatar-art"><div class="avatar-head"></div><div class="avatar-body"></div></div><div class="avatar-mark">?</div><div class="avatar-base"></div><div class="avatar-name">敌人</div><div class="avatar-tag">未出现</div></div>`;
  const name=enemy.name, intent=enemy.intent||'', text=`${name} ${intent}`;
  let sigil='敌', tag='目标', cls='avatar-enemy';
  if(name==='Baiye'){sigil='白';tag='终局 Boss';cls+=' avatar-boss'}
  else if(text.includes('狂暴')){sigil='狂';tag='狂暴';cls+=' avatar-rage'}
  else if(text.includes('毒')){sigil='毒';tag='毒系';cls+=' avatar-toxic'}
  else if(text.includes('护甲')||text.includes('甲')){sigil='甲';tag='重甲';cls+=' avatar-armor'}
  else if(text.includes('攻击')||text.includes('爪')||text.includes('击')){sigil='爪';tag='攻击';cls+=' avatar-rage'}
  return `<div class="avatar-shell ${cls}">
    <div class="avatar-art"><div class="avatar-head"></div><div class="avatar-body"></div><div class="avatar-weapon"></div></div>
    <div class="avatar-mark">${sigil}</div><div class="avatar-base"></div>
    <div class="avatar-name">${esc(name)}</div><div class="avatar-tag">${tag}</div>
  </div>`;
}
function enemyParty(enemies,activeEnemy){
  if(!enemies||!enemies.length)return enemyAvatar(activeEnemy);
  return enemies.map(enemy=>{
    const statuses=Object.entries(enemy.statuses||{}).filter(([,v])=>Number(v)>0).map(([k,v])=>`${statusNames[k]||k}${v}`).join(' ');
    const mechanics=mechanicText(enemy.mechanics||{});
    const explain=mechanicExplain(enemy.mechanics||{});
    const meta=[enemy.intent||'未知意图',statuses,mechanics].filter(Boolean).join(' · ');
    const hpPct=enemy.max_hp?Math.max(0,Math.min(100,Math.round(enemy.hp/enemy.max_hp*100))):0;
    return `<button class="enemy-party-card ${enemy.active?'active':''} ${enemy.alive?'':'dead'}" data-enemy-index="${enemy.index}" ${enemy.alive?'':'disabled'} onclick="selectTarget(${enemy.index})" title="${esc([meta,explain].filter(Boolean).join('\\n'))}">
      ${enemyAvatar(enemy)}
      <div class="enemy-hud">
        <div class="enemy-hud-top"><span>${enemy.active?'目标':esc(enemy.intent||'待机')}</span><span>${enemy.hp}/${enemy.max_hp}</span></div>
        <div class="enemy-hpbar"><span style="width:${hpPct}%"></span></div>
        <div class="enemy-hud-meta">${esc(meta)}</div>
      </div>
    </button>`;
  }).join('');
}
async function selectTarget(index){render(await postJson('/api/action',{action:'select_target',params:{target_index:index}}))}
function renderEnemyRoster(enemies){
  const target=document.getElementById('enemyRoster');
  if(!target)return;
  target.innerHTML=(enemies||[]).map(enemy=>{
    const statuses=Object.entries(enemy.statuses||{}).filter(([,v])=>Number(v)>0).map(([k,v])=>`${statusNames[k]||k}${v}`).join(' ');
    const mechanics=mechanicText(enemy.mechanics||{});
    const meta=[enemy.intent||'未知意图',statuses,mechanics].filter(Boolean).join(' · ');
    return `<button class="enemy-chip ${enemy.active?'active':''} ${enemy.alive?'':'dead'}" ${enemy.alive?'':'disabled'} onclick="selectTarget(${enemy.index})">
      <div><div class="enemy-chip-name">${enemy.active?'目标 · ':''}${esc(enemy.name)}</div><div class="enemy-chip-meta">${esc(meta)}</div></div>
      <div class="enemy-chip-badge">${enemy.hp}/${enemy.max_hp}</div>
    </button>`;
  }).join('');
}
function mechanicText(mechanics){
  const parts=[];
  if(mechanics.pack_hunter)parts.push(`群猎+${mechanics.pack_hunter}`);
  if(mechanics.shell_guard)parts.push(`开战甲${mechanics.shell_guard}`);
  if(mechanics.thorn)parts.push(`反伤${mechanics.thorn}`);
  if(mechanics.death_poison)parts.push(`亡毒${mechanics.death_poison}`);
  if(mechanics.rally_block)parts.push(`号令甲${mechanics.rally_block}`);
  return parts.join(' ');
}
function mechanicExplain(mechanics){
  const parts=[];
  if(mechanics.pack_hunter)parts.push(`群猎：场上还有其他敌人时，攻击伤害 +${mechanics.pack_hunter}`);
  if(mechanics.shell_guard)parts.push(`甲壳护卫：开战获得 ${mechanics.shell_guard} 护甲`);
  if(mechanics.thorn)parts.push(`尖刺外壳：被攻击牌命中时反伤 ${mechanics.thorn}`);
  if(mechanics.death_poison)parts.push(`毒囊爆裂：死亡时让玩家中毒 +${mechanics.death_poison}`);
  if(mechanics.rally_block)parts.push(`号令：行动前让全体敌人获得 ${mechanics.rally_block} 护甲`);
  return parts.join('；');
}
function relicHookExplain(hook){
  return {
    battle_start_block:'战斗开始时直接加护甲。',
    battle_start_strength:'战斗开始时增加本场力量。',
    battle_start_dexterity:'战斗开始时增加本场敏捷。',
    battle_start_poison:'战斗开始时对所有敌人施加中毒。',
    battle_start_burn:'战斗开始时对所有敌人施加灼烧。',
    first_turn_energy:'第一回合增加可用能量。',
    first_turn_draw:'第一回合额外抽牌。',
    attack_bonus:'攻击牌结算基础伤害时额外加成。',
    weapon_bonus:'武器牌按武器修正额外加伤。',
    status_weapon_bonus:'目标有中毒或灼烧时，武器牌额外加伤。',
    group_damage_bonus:'只增强全体伤害牌，不增强单体牌。',
    group_card_block:'使用全体类卡牌后获得护甲。',
    overkill_splash:'攻击/武器牌击杀敌人后，对其他敌人造成固定溅射伤害。',
    poison_burst_bonus:'提高毒爆倍率。',
    toxic_passive_bonus:'诡毒师被动额外施加中毒。',
    burn_strength_bonus:'燃尽者灼烧转力量时额外增加力量。',
    exile_start_bonus:'流亡者开战适应加成提高。',
    exhaust_block:'每消耗一张牌获得护甲。',
  }[hook]||hook||'';
}
function nodeIcon(id){return {combat:'战',elite:'精',boss:'王',event:'?',shop:'商',rest:'息',treasure:'箱',training:'训',armory:'武'}[id]||'-'}
function renderProcess(state, combat){
  const target=document.getElementById('gameLog');
  const settlement=state.settlement;
  if(settlement){
    const cls=settlement.result==='won'?'win':settlement.result==='lost'?'lose':'';
    const records=(settlement.records||settlement.logs||[]).slice(-10).reverse();
    target.innerHTML=`<div class="summary-row ${cls}"><b>${esc(settlement.title||'结算')}</b><br>${settlement.result==='won'?'胜利':settlement.result==='lost'?'失败':'完成'}${settlement.enemy?` · ${esc(settlement.enemy)}`:''}${settlement.gold?` · 金币 +${settlement.gold}`:''}${settlement.relic?`<br>遗物：${esc(settlement.relic.name)} - ${esc(settlement.relic.description)}`:''}${settlement.picked!==undefined?`<br>奖励选择：${settlement.picked?esc(settlement.picked.name):'跳过'}`:''}${(settlement.lines||[]).map(line=>`<br>${esc(line)}`).join('')}</div>${records.map(x=>`<div class="log-row">${esc(x)}</div>`).join('')}`;
    return;
  }
  if(combat){
    const records=[...(combat.turn_records||[]),...(combat.log||[])].slice(-14).reverse();
    target.innerHTML=records.map(x=>`<div class="log-row">${esc(x)}</div>`).join('')||'<div class="empty">本回合还没有行动。</div>';
    return;
  }
  target.innerHTML='<div class="empty">选择路线开始下一层。</div>';
}
function renderDeck(cards){document.getElementById('deckCount').textContent=`${cards.length} cards`;document.getElementById('deck').innerHTML=cards.map(c=>`<div class="deck-row"><div class="deck-name"><span>${esc(c.name)}${c.upgrade_level?` +${c.upgrade_level}`:''}</span><span class="badge">${c.cost}</span></div><p>${esc(c.description)}</p></div>`).join('')||'<div class="empty">暂无卡牌。</div>'}
function renderRelics(relics){document.getElementById('relics').innerHTML=relics.length?`<div class="relic-grid">${relics.map(r=>relicCard(r,`showRelicDetail(${jsStr(r.name)},${jsStr(r.description)},${jsStr(r.hook||'')})`)).join('')}</div>`:'<div class="empty">暂无遗物。</div>'}
function renderHistory(history){document.getElementById('history').innerHTML=history.slice(-8).reverse().map(h=>`<div class="history-row"><b>${esc(h.agent||'player')} · ${esc(h.action||'-')}</b><div class="mono">${esc(JSON.stringify(h.params||{}))}</div><div class="reason">${esc(h.reason||'')}</div></div>`).join('')||'<div class="empty">暂无操作。</div>'}
function renderRoleHint(player){const hints={exile:'流亡者：每场战斗开始获得适应加成。力量和敏捷一起成长，适合稳定数值压制。',toxicist:'诡毒师：出牌后按伤害或护甲给敌人追加中毒。毒爆和毒层消费是核心节奏。',burner:'燃尽者：免疫自身灼烧。每 3 层本回合施加的灼烧转化为 1 点力量，越拖越强。'};document.getElementById('roleHint').innerHTML=`<div class="log-row">${esc(hints[player.role_id]||'选择角色开始。')}</div>`}
function renderStatusBadges(statuses){return Object.entries(statuses).filter(([,v])=>Number(v)>0).map(([k,v])=>{const kind=k==='poison'?'green':k==='burn'||k==='bleed'?'red':k.includes('energy')?'blue':'gold';return `<span class="badge ${kind}">${esc(statusNames[k]||k)} ${v}</span>`}).join('')}
function togglePanel(id,event){
  if(event?.target?.closest('button'))event.stopPropagation();
  const panel=document.getElementById(id);
  if(!panel)return;
  panelTouched.add(id);
  setPanelCollapsed(id,!panel.classList.contains('collapsed'));
}
function setPanelCollapsed(id,collapsed){
  const panel=document.getElementById(id);
  if(!panel)return;
  panel.classList.toggle('collapsed',collapsed);
  const btn=panel.querySelector('.panel-toggle');
  if(btn)btn.textContent=collapsed?'展开':'收起';
}
function syncPanelDefaults(state){
  if(!panelTouched.has('handPanel'))setPanelCollapsed('handPanel',state.phase!=='combat');
  if(!panelTouched.has('actionPanel'))setPanelCollapsed('actionPanel',false);
  if(!panelTouched.has('relicPanel'))setPanelCollapsed('relicPanel',(state.player?.relics||[]).length===0);
}
function nodeHint(id){return {combat:'普通战斗，胜利后获得金币和卡牌奖励。',elite:'更强敌人，胜利后额外获得遗物。',boss:'章节 Boss，胜利后进入下一章。',event:'随机事件，通常带有资源交换。',shop:'购买卡牌、遗物、升级、移除卡牌。',rest:'恢复生命或升级卡牌。',treasure:'直接获得一个遗物。',training:'提升生命上限或升级卡牌。',armory:'选择武器牌，或放弃换金币。'}[id]||'未知节点。'}
function choiceDesc(o){if(o.card)return `[${o.card.cost}] ${o.card.description}`;if(o.cards&&o.cards.length)return o.cards.map(c=>c.name).join(' / ');return o.kind||''}
function showCardCast(card){
  if(!card)return;
  const fx=document.getElementById('battleFx');
  if(!fx)return;
  const node=document.createElement('div');
  node.className='cast-card';
  node.innerHTML=`${cardVisual(card)}<div class="cast-name">${esc(card.name)}${card.upgrade_level?` +${card.upgrade_level}`:''}</div><div class="cast-desc">${esc(card.description)}${card.preview?`<div class="skill-preview">当前：${esc(card.preview)}</div>`:''}</div>`;
  fx.appendChild(node);
  setTimeout(()=>node.remove(),760);
}
function showActionFeedback(actionResult,card,targetIndex){
  const result=actionResult?.result||{};
  const played=result.played||card;
  const logs=[...(result.logs||[]),...((result.combat_result||{}).records||[])];
  const text=`${played?.name||''} ${played?.description||''} ${logs.join(' ')}`;
  const kinds=effectKinds(text,played);
  const hitAll=String(played?.description||'').includes('所有敌人')||String(played?.preview||'').includes('全体');
  kinds.forEach((kind,i)=>setTimeout(()=>playBattleEffect(kind,feedbackLabel(kind,text),targetIndex,hitAll),i*110));
}
function effectKinds(text,card){
  const kinds=[];
  const source=String(text||'');
  if(source.includes('护甲')||card?.category==='defense')kinds.push('block');
  if(source.includes('中毒')||source.includes('毒'))kinds.push('poison');
  if(source.includes('灼烧')||source.includes('燃')||source.includes('火'))kinds.push('burn');
  if(source.includes('力量')||source.includes('敏捷')||source.includes('强化')||card?.category==='power')kinds.push('buff');
  if(source.includes('伤害')||source.includes('攻击')||card?.category==='attack'||card?.category==='weapon')kinds.unshift('damage');
  return [...new Set(kinds)].slice(0,3);
}
function feedbackLabel(kind,text){
  const n=String(text||'').match(/(?:造成|获得|施加|附加|回复)\s*(\d+)/);
  const value=n?` ${n[1]}`:'';
  return {damage:`伤害${value}`,block:`护甲${value}`,poison:`中毒${value}`,burn:`灼烧${value}`,buff:'强化'}[kind]||'效果';
}
function playBattleEffect(kind,label,targetIndex,hitAll=false){
  const fx=document.getElementById('battleFx'), field=document.querySelector('.battlefield'), enemy=document.getElementById('enemyUnit'), player=document.getElementById('playerUnit');
  if(!fx)return;
  const target=kind==='block'||kind==='buff'?'player':'enemy';
  const targetEnemy=document.querySelector(`.enemy-party-card[data-enemy-index="${targetIndex}"]`);
  const unit=target==='player'?player:(hitAll?enemy:(targetEnemy||document.querySelector('.enemy-party-card.active')||enemy));
  unit?.classList.remove('hit','guard');
  void unit?.offsetWidth;
  unit?.classList.add(target==='player'?'guard':'hit');
  if(kind==='damage'||kind==='burn')pulseClass(field,'shake',360);
  const orb=document.createElement('div');
  orb.className=`fx-orb ${kind}`;
  fx.appendChild(orb);
  setTimeout(()=>orb.remove(),560);
  const float=document.createElement('div');
  float.className=`float-number ${target} ${kind}`;
  float.textContent=label;
  fx.appendChild(float);
  setTimeout(()=>float.remove(),920);
}
function pulseClass(el,cls,ms){
  if(!el)return;
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),ms);
}
function esc(v){const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML}
function jsStr(v){return JSON.stringify(String(v??''))}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
document.getElementById('newBtn').addEventListener('click',newGame);
document.getElementById('startBtn').addEventListener('click',startCombat);
document.getElementById('endBtn').addEventListener('click',endTurn);
document.getElementById('autoBtn').addEventListener('click',autoStep);
api('/api/state').then(render);
</script>
</body>
</html>
